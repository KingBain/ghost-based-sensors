---
#002-Repo-CodeScan.yaml
name: Trivy Code Scan Example

on:
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Start Sysdig System Capture
      uses: gccloudone-aurora-collab/falco-actions/start@0e08819f5c64d0374be9fbd664e751eab1005a09
      with:
        mode: analyze
        sysdig-version: "sha256:c63ec30ce5db5b0d934343028031bba32b81cb7cb3f82e82d87b72c9b1694922"
        custom-rule-file: '${{ github.workspace }}/.github/falco/rules/002-Repo-CodeScan.yaml'

# BEGIN - Normal Pipeline Workload
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Run Trivy Scan Action
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
      with:
        version: "v0.69.3"
        severity: "CRITICAL,HIGH"
        ignore-unfixed: true
        scan-type: "fs"
        format: "sarif"
        output: "trivy-results.sarif"

    - name: Upload Trivy Report to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
      with:
        sarif_file: trivy-results.sarif

# END - Normal Pipeline Workload

    - name: Stop Sysdig System Capture
      uses: gccloudone-aurora-collab/falco-actions/stop@0e08819f5c64d0374be9fbd664e751eab1005a09
      with:
        mode: analyze
        
  scan:
    needs: capture 
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Analyze
      uses: gccloudone-aurora-collab/falco-actions/analyze@0e08819f5c64d0374be9fbd664e751eab1005a09
      env:
        SYSDIG_VERSION: 'sha256:c63ec30ce5db5b0d934343028031bba32b81cb7cb3f82e82d87b72c9b1694922'
      with:
        falco-version: 'sha256:ba05dfb209cc1c2e912ce116d230b5f59c4542e7286f05b663c499066d5d6a42'
        custom-rule-file: '${{ github.workspace }}/.github/falco/rules/002-Repo-CodeScan.yaml'

  # disabled for now      
  #repo-scan:
  #  needs: scan
  #  uses: ./.github/workflows/000-Scan-Analysis.yaml



